  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

  <script>
  // PDF Merging
  
  const medications = Object.keys(pdfFiles).map(key => ({
              value: key,
              name: pdfFiles[key].name // Use the custom name from the pdfFiles object
          }));
  
          const selectedFiles = [];
          const maxFiles = 10; // Maximum number of PDFs allowed
  
          const medicationInput = document.getElementById('medicationInput');
          const suggestionsContainer = document.getElementById('suggestions');
          const mergeAndPrintButton = document.getElementById('mergeAndPrint');
  
          medicationInput.addEventListener('input', () => {
              const query = medicationInput.value.toLowerCase();
              suggestionsContainer.innerHTML = ''; // Clear previous suggestions
  
              if (query) {
                  // Filter medications to only those that start with the query
                  const filteredMedications = medications.filter(med => 
                      med.name.toLowerCase().startsWith(query) && !selectedFiles.includes(med.value)
                  );
  
                  filteredMedications.forEach(med => {
                      const suggestionItem = document.createElement('div');
                      suggestionItem.className = 'autocomplete-suggestion';
                      suggestionItem.textContent = med.name;
                      suggestionItem.onclick = () => addMedication (med.value, med.name);
                      suggestionsContainer.appendChild(suggestionItem);
                  });
              }
          });
  
          function addMedication(value, name) {
              if (selectedFiles.length >= maxFiles) {
                  alert("You have reached the maximum number of items in the list.");
                  return;
              }
  
              if (!selectedFiles.includes(value)) {
                  selectedFiles.push(value);
  
                  // Create a list item with a hyperlink and an "X" button
                  const listItem = document.createElement('li');
                  listItem.className = 'list-group-item border-start-0 border-top-0 border-end-0 border-2 border-warning rounded-0'; // Add Bootstrap list-group-item class. Default: 'list-group-item'. Change to: 'list-group-item border-start-0 border-end-0 border-2 border-warning rounded-0'
                  const link = document.createElement('a');
                  link.className = 'text-dark text-decoration-none'; // Add Bootstrap class to element 'a'. NOT INCLUDED BY DEFAULT. ADD AFTER CHANGES
                  link.href = pdfFiles[value].url; // Set the href to the PDF URL
                  link.target = '_blank'; // Open in a new window
                  link.textContent = name; // Set the link text to the user-friendly name
                  listItem.appendChild(link); // Append the link to the list item
  
                  // Create the "X" button
                  const removeButton = document.createElement('button');
                  removeButton.className = 'btn btn-sm btn-warning rounded-0 text-white font-monospace fs-6'; // Add Bootstrap button classes. Default: 'btn btn-sm btn-danger'. Change to: 'btn btn-sm btn-warning rounded-0 text-white font-monospace'
                  removeButton.textContent = 'REMOVE'; // Default: ' X'. Change to: 'REMOVE'
                  removeButton.style.marginLeft = '10px'; // Add some space between the link and the button
                  removeButton.onclick = () => {
                      // Remove the PDF from the selectedFiles array
                      selectedFiles.splice(selectedFiles.indexOf(value), 1);
                      // Remove the list item from the display
                      document.getElementById('selectedPdfList').removeChild(listItem);
                      enableMergeAndPrintButton(); // Re-enable the button
                  };
  
                  listItem.appendChild(removeButton); // Append the "X" button to the list item
                  document.getElementById('selectedPdfList').appendChild(listItem); // Append the list item to the list
  
                  medicationInput.value = ''; // Clear input field
                  suggestionsContainer.innerHTML = ''; // Clear suggestions
                  enableMergeAndPrintButton(); // Enable the button
              } else {
                  alert('This PDF has already been added.');
              }
          }
  
          // Clear List button functionality
          document.getElementById('clearList').addEventListener('click', () => {
              selectedFiles.length = 0; // Clear the selected files array
              document.getElementById('selectedPdfList').innerHTML = ''; // Clear the list display
              enableMergeAndPrintButton(); // Re-enable the button
          });
  
          function enableMergeAndPrintButton() {
              if (selectedFiles.length > 0) {
                  mergeAndPrintButton.disabled = false;
              } else {
                  mergeAndPrintButton.disabled = true;
              }
          }
  
          document.getElementById('mergeAndPrint').addEventListener('click', async () => {
              mergeAndPrintButton.disabled = true; // Disable the button
  
              if (selectedFiles.length === 0) {
                  alert('Please select at least one PDF file.');
                  return;
              }
  
              const loadingIndicator = document.getElementById('loadingIndicator');
              loadingIndicator.style.display = 'block'; // Show loading indicator
  
              const pdfDocs = [];
              const invalidPdfs = [];
  
              for (const file of selectedFiles) {
                  try {
                      const response = await fetch(pdfFiles[file].url);
                      const arrayBuffer = await response.arrayBuffer();
                      const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                      pdfDocs.push(pdfDoc);
                  } catch (error) {
                      const pdfName = pdfFiles[file].name; // Get the user-friendly name of the PDF
                      invalidPdfs.push(pdfName); // Add the user-friendly name to the list
                  }
              }
  
              if (invalidPdfs.length > 0) {
                  const errorMessage = `Error loading PDFs: ${invalidPdfs.join(', ')}. Please check the PDF URLs and try again.`;
                  alert(errorMessage);
                  loadingIndicator.style.display = 'none'; // Hide loading indicator on error
                  return;
              }
  
              // Create a new PDF document
              const mergedPdf = await PDFLib.PDFDocument.create();
  
              // Copy pages from each PDF document to the new document
              for (const pdfDoc of pdfDocs) {
                  const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                  copiedPages.forEach((page) => mergedPdf.addPage(page));
              }
  
              // Save the merged PDF
              const mergedPdfFile = await mergedPdf.save();
              const blob = new Blob([mergedPdfFile], { type: 'application/pdf' });
              const url = URL.createObjectURL(blob);
  
              // Open the PDF in a new tab
              window.open(url, '_blank');
  
              // Clean up
              URL.revokeObjectURL(url);
  
              loadingIndicator.style.display = 'none'; // Hide loading indicator after merging
          });
  </script>
